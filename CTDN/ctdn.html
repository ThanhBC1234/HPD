<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour 360 - THPT Chuyên Trần Đại Nghĩa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; font-family: Arial, sans-serif; background: #000; overflow: hidden; }
        #panorama { width: 100%; height: 100vh; }
        
        .hotspot-circle {
            width: 25px; 
            height: 25px; 
            background-color: rgba(255, 255, 255, 0.5); 
            border-radius: 50%; 
            border: 2px solid #fff;
            cursor: pointer;
            transition: 0.001s;
        }
        .hotspot-circle:hover {
            background-color: rgba(255, 255, 255, 1);
            transform: scale(1.1);
        }

        div.pnlm-tooltip span {
            white-space: pre-line !important;
            background-color: rgba(0, 0, 0, 0.8) !important;
            border-radius: 8px !important;
            padding: 10px 15px !important;
            line-height: 1.4 !important;
        }
        .pnlm-load-box { 
            display: none !important; 
        }

        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 1.2s ease-in-out;
        }

        .modern-menu {
            position: absolute; left: 30px; top: 100px; z-index: 10;
            color: white; font-family: Arial, sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .menu-category {
            font-size: 18px; font-weight: bold; cursor: pointer; 
            margin-bottom: 15px; transition: 0.3s;
        }
        .menu-category:hover { color: #00d2ff; }
        .sub-menu {
            display: none;
            padding-left: 20px; margin-bottom: 20px; margin-top: -5px;
            border-left: 2px solid rgba(255, 255, 255, 0.4);
        }
        .sub-menu.active { display: block; }
        .menu-link {
            cursor: pointer; padding: 8px 0; font-size: 15px; transition: 0.2s;
        }
        .menu-link:hover {
            padding-left: 10px; color: #00d2ff; font-weight: bold;
        }
        .ui-btn { padding: 8px 12px; border: none; background: #0035B5; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px;}
        .ui-btn:hover { background: #00185F; }
    </style>
</head>
<body>
<div id="transition-overlay"></div>
<div id="panorama"></div>

<div class="modern-menu">
    <div class="menu-category" onclick="toggleSub(this)">▶ Khu Vực Chính</div>
    <div class="sub-menu">
        <div class="menu-link" onclick="teleportWithEffect('cong')">Cổng Trường</div>
        <div class="menu-link" onclick="teleportWithEffect('sanh')">Sảnh Chính</div>
        <div class="menu-link" onclick="teleportWithEffect('san')">Sân Trường</div>
        <div class="menu-link" onclick="teleportWithEffect('cong_vien')">Công Viên</div>
        <div class="menu-link" onclick="teleportWithEffect('hanh_lang')">Hành Lang</div>
    </div>

    <div class="menu-category" onclick="toggleSub(this)">▶ Khu Học Tập & Làm Việc</div>
    <div class="sub-menu">
        <div class="menu-link" onclick="teleportWithEffect('phong_hop')">Phòng Họp</div>
        <div class="menu-link" onclick="teleportWithEffect('thu_vien')">Thư Viện</div>
    </div>
</div>

<script>
    var viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": "cong",
            "sceneFadeDuration": 1000, 
            "autoLoad": true,
            "autoRotate": 0, 
            "hfov": 120, 
            "minHfov": 60, 
            "maxHfov": 120 
        },
        "scenes": {
            "cong": {
                "type": "equirectangular",
                "panorama": "CongTruong.webp",
                "pitch": 0, "yaw": 0,
                "hotSpots": [
                    { "pitch": -4.5, "yaw": 20, "type": "info", "clickHandlerArgs": "san", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sân Trường\nMô tả ngắn gọn...", },
                    { "pitch": -3, "yaw": 46.3, "type": "info", "clickHandlerArgs": "sanh", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sảnh\nMô tả ngắn gọn..." }
                ]
            },

            "sanh": {
                "type": "equirectangular",
                "panorama": "Sanh.webp",
                "pitch": 0, "yaw": 0,
                "hotSpots": [
                    { "pitch": 2.5, "yaw": 146, "type": "info", "clickHandlerArgs": "cong", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Cổng Trường\nMô tả..." },
                    { "pitch": -3, "yaw": 186, "type": "info", "clickHandlerArgs": "san", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sân Trường\nMô tả..." },
                    { "pitch": -1, "yaw": -107.4, "type": "info", "clickHandlerArgs": "hanh_lang", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Hành lang\nMô tả..." },
                    { "pitch": -1, "yaw": -59, "type": "info", "clickHandlerArgs": "phong_hop", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Phòng họp\nMô tả..." }
                ]
            },

            "san": {
                "type": "equirectangular",
                "panorama": "SanTruong.webp",
                "pitch": 0, "yaw": 0,
                "hotSpots": [
                    { "pitch": -0.3, "yaw": 73, "type": "info", "clickHandlerArgs": "cong", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Cổng Trường\nMô tả..." },
                    { "pitch": -0.7, "yaw": -37, "type": "info", "clickHandlerArgs": "sanh", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sảnh\nMô tả..." },
                    { "pitch": -1, "yaw": 227, "type": "info", "clickHandlerArgs": "cong_vien", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Công viên\nMô tả..." },
                    { "pitch": 5, "yaw": -83, "type": "info", "clickHandlerArgs": "thu_vien", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Thư viện\nMô tả..." },
                    { "pitch": -0.5, "yaw": -74.5, "type": "info", "clickHandlerArgs": "hanh_lang", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Hành lang\nMô tả..." }
                ]
            },

            "cong_vien": {
                "type": "equirectangular",
                "panorama": "CongVien.webp",
                "pitch": 0, "yaw": 0,
                "hotSpots": [
                    { "pitch": -0.5, "yaw": 25, "type": "info", "clickHandlerArgs": "san", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sân Trường\nMô tả..." },
                    { "pitch": 0, "yaw": -23, "type": "info", "clickHandlerArgs": "hanh_lang", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Hành lang\nMô tả..." },
                    { "pitch": 7.5, "yaw": -32, "type": "info", "clickHandlerArgs": "thu_vien", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Thư viện\nMô tả..." }
                ]
            },

            "phong_hop": {
                "type": "equirectangular",
                "panorama": "PhongHop.webp",
                "pitch": 0, "yaw": 0,
                "hotSpots": [
                    { "pitch": 0.5, "yaw": 192, "type": "info", "clickHandlerArgs": "sanh", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sảnh\nMô tả..." },
                    { "pitch": 1, "yaw": -131, "type": "info", "clickHandlerArgs": "hanh_lang", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Hành lang\nMô tả..." }
                ]
            },

            "hanh_lang": {
                "type": "equirectangular",
                "panorama": "HanhLang_1.webp",
                "pitch": 0, "yaw": 0,
                "hotSpots": [
                    { "pitch": -1, "yaw": -125, "type": "info", "clickHandlerArgs": "cong_vien", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Công viên\nMô tả..." },
                    { "pitch": 0.3, "yaw": 178, "type": "info", "clickHandlerArgs": "san", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sân Trường\nMô tả..." },
                    { "pitch": -1, "yaw": 92, "type": "info", "clickHandlerArgs": "sanh", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sảnh\nMô tả..." },
                    { "pitch": 0, "yaw": 0, "type": "info", "clickHandlerArgs": "phong_hop", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Phòng họp\nMô tả..." }
                ]
            },

            "thu_vien": {
                "type": "equirectangular",
                "panorama": "ThuVien.webp",
                "pitch": 0, "yaw": 0,
                "hotSpots": [
                    { "pitch": 0, "yaw": 12, "type": "info", "clickHandlerArgs": "cong_vien", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Công viên\nMô tả..." },
                    { "pitch": -5, "yaw": -77, "type": "info", "clickHandlerArgs": "san", "cssClass": "hotspot-circle", "clickHandlerFunc": teleportWithEffect, "text": "Sân Trường\nMô tả..." }
                ]
            }
        }
    });

    window.addEventListener('load', function() {
        setTimeout(function() {
            const scenes = viewer.getConfig().scenes;
            const currentScene = viewer.getScene();
            let imageUrls = [];

            for (let key in scenes) {
                if (scenes.hasOwnProperty(key) && key !== currentScene) {
                    imageUrls.push(scenes[key].panorama);
                }
            }

            function preloadNext(index) {
                if (index >= imageUrls.length) return;
                
                const img = new Image();
                img.onload = function() {
                    preloadNext(index + 1);
                };
                img.onerror = function() {
                    preloadNext(index + 1);
                };
                img.src = imageUrls[index];
            }

            preloadNext(0);
        }, 2000); 
    });


    function toggleSub(element) {
        if(element.innerText.includes('▶')) {
            element.innerText = element.innerText.replace('▶', '▼');
        } else {
            element.innerText = element.innerText.replace('▼', '▶');
        }
        var subMenu = element.nextElementSibling;
        subMenu.classList.toggle('active');
    }

    function teleportWithEffect(event, args) {
        var targetScene = (typeof args === 'string') ? args : event;
        
        let currentHfov = viewer.getHfov();
        let currentYaw = viewer.getYaw();
        let duration = 1200;

        let overlay = document.getElementById('transition-overlay');
        overlay.style.opacity = '1';

        viewer.setYaw(currentYaw + 180, duration); 
        viewer.setHfov(currentHfov - 60, duration);

        setTimeout(() => {
            viewer.loadScene(targetScene);
            
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 200);

        }, duration);
    }
</script>

</body>
</html>
